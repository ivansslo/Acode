name: Build APK (Fork with Rocdex)

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'App type (free/paid)'
        required: true
        default: 'paid'
        type: choice
        options:
          - paid
          - free
      build_mode:
        description: 'Build mode (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Cordova Platform & Plugins
        run: |
          rm -rf platforms/android
          cordova platform add android@10 --no-telemetry
          node utils/setup.js || true

      - name: Update Gradle wrapper
        run: |
          WRAPPER_FILE="platforms/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_FILE" ]; then
            sed -i 's|gradle-[0-9.]*-all|gradle-8.11-all|g' "$WRAPPER_FILE"
            sed -i 's|gradle-[0-9.]*-bin|gradle-8.11-all|g' "$WRAPPER_FILE"
            echo "Updated Gradle wrapper:"
            cat "$WRAPPER_FILE"
          else
            echo "WARNING: gradle-wrapper.properties not found at $WRAPPER_FILE"
            ls -la platforms/android/gradle/wrapper/ 2>/dev/null || echo "wrapper dir missing"
          fi

      - name: Build APK with Rocdex
        run: |
          chmod +x utils/scripts/build.sh
          sh utils/scripts/build.sh ${{ inputs.app_type || 'paid' }} ${{ inputs.build_mode || 'dev' }}
        env:
          TMPDIR: /tmp
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: acode-rocdex-${{ inputs.app_type || 'paid' }}-${{ inputs.build_mode || 'dev' }}
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            platforms/android/app/build/outputs/apk/**/*.aab
          if-no-files-found: warn
