name: Build APK (Rocdex)

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'App type (free/paid)'
        required: true
        default: 'paid'
        type: choice
        options:
          - paid
          - free
      build_mode:
        description: 'Build mode (dev/prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Cordova Platform & Plugins
        run: |
          rm -rf platforms/android plugins
          cordova platform add android@10 --no-telemetry
          node utils/setup.js || true

      - name: Update Gradle wrapper
        run: |
          WRAPPER_FILE="platforms/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_FILE" ]; then
            sed -i 's|gradle-[0-9.]*-all|gradle-8.11-all|g' "$WRAPPER_FILE"
            sed -i 's|gradle-[0-9.]*-bin|gradle-8.11-all|g' "$WRAPPER_FILE"
            cat "$WRAPPER_FILE"
          fi

      - name: Generate signing keystore
        run: |
          STORE_FILE="rocdex-release.keystore"
          STORE_PASS="rocdex2024"
          KEY_ALIAS="rocdex"
          keytool -genkeypair -v \
            -keystore "$STORE_FILE" \
            -storepass "$STORE_PASS" \
            -alias "$KEY_ALIAS" \
            -keypass "$STORE_PASS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Rocdex, OU=Dev, O=Rocdex, L=Jakarta, ST=ID, C=ID"
          echo "Keystore created successfully"
          cat > build.json << BJSON
          {
            "android": {
              "release": {
                "keystore": "$STORE_FILE",
                "storePassword": "$STORE_PASS",
                "alias": "$KEY_ALIAS",
                "password": "$STORE_PASS"
              }
            }
          }
          BJSON
          echo "build.json created"
          cat build.json

      - name: Build Web Assets
        run: |
          node ./utils/config.js ${{ inputs.build_mode == 'prod' && 'p' || 'd' }} ${{ inputs.app_type || 'paid' }}
          rspack --mode ${{ inputs.build_mode == 'prod' && 'production' || 'development' }}

      - name: Build Release APK
        if: ${{ inputs.build_mode == 'prod' || github.event_name == 'push' }}
        run: |
          chmod +x utils/scripts/build.sh
          sh utils/scripts/build.sh ${{ inputs.app_type || 'paid' }} prod
        env:
          TMPDIR: /tmp
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Debug APK
        if: ${{ inputs.build_mode == 'dev' }}
        run: |
          chmod +x utils/scripts/build.sh
          sh utils/scripts/build.sh ${{ inputs.app_type || 'paid' }} dev
        env:
          TMPDIR: /tmp
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Rename APK with version
        if: always()
        run: |
          VERSION=$(grep -oP 'version="\K[0-9.]+' config.xml)
          APK_DIR="platforms/android/app/build/outputs/apk"
          if [ -d "$APK_DIR" ]; then
            find "$APK_DIR" -name "*.apk" -exec sh -c '
              for f; do
                dir=$(dirname "$f")
                base=$(basename "$f" .apk)
                mv "$f" "$dir/acode-rocdex-v${VERSION}-${base}.apk" 2>/dev/null || true
              fi
            ' _ {} +
            echo "APKs renamed with version $VERSION"
            find "$APK_DIR" -name "*.apk" -exec ls -lh {} \;
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: acode-rocdex-${{ inputs.build_mode || 'prod' }}-${{ github.run_number }}
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            platforms/android/app/build/outputs/apk/**/*.aab
          if-no-files-found: warn

      - name: Create Release
        if: ${{ (inputs.build_mode == 'prod' || github.event_name == 'push') && success() }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: rocdex-v${{ github.run_number }}
          name: Rocdex Plugin Build #${{ github.run_number }}
          files: platforms/android/app/build/outputs/apk/**/*.apk
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
