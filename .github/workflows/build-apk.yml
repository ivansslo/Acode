name: Build APK (Fork)

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'App type (free/paid)'
        required: true
        default: 'paid'
        type: choice
        options:
          - paid
          - free
      build_mode:
        description: 'Build mode (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup Cordova Platform & Plugins
        run: |
          cordova platform add android@10 --no-telemetry || true
          node utils/setup.js || true

      - name: Build APK
        run: |
          chmod +x utils/scripts/build.sh
          sh utils/scripts/build.sh ${{ inputs.app_type }} ${{ inputs.build_mode }}
        env:
          TMPDIR: /tmp

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: acode-${{ inputs.app_type }}-${{ inputs.build_mode }}
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            platforms/android/app/build/outputs/apk/**/*.aab
          if-no-files-found: warn
